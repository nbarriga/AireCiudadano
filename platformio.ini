; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

; =========================================================
; 1. VARIABLES COMUNES (Edita las librerías solo aquí)
; =========================================================
[common]
; --- Versiones de WiFiManager ---
lib_wifi_master = https://github.com/danielbernalb/WiFiManager.git#AC_master_20feb2024
lib_wifi_wpa2   = https://github.com/danielbernalb/WiFiManager.git#AC_wpa2_v2.0.16-rc.2_14julio2023

; --- Librerías Core (Usadas en el 90% de las placas) ---
lib_core =
    https://github.com/danielbernalb/pubsubclient.git
    https://github.com/danielbernalb/PMST.git
    bblanchon/ArduinoJson@^7.4.2

; --- Sensores Básicos de partículas y humedad ---
lib_sensors_basic =
    paulvha/sps30@^1.4.18
    sensirion/Sensirion I2C SEN5X@^0.3.0
    adafruit/Adafruit SHT31 Library@^2.2.2
    adafruit/Adafruit SHT4x Library@^1.0.5

; --- Pantalla OLED (U8g2) ---
; NOTA: separada de lib_sensors_extra para evitar incluir AM2320/RTClib
; en entornos que solo necesitan pantalla (ej: esp8266wpa2)
lib_display =
    olikraus/U8g2@^2.36.18

; --- Pusadores para TTGO TDisplay
lib_pulsador =
    lennarthennigs/Button2@^2.5.0

; --- Sensores Extras: temperatura ambiente y RTC ---
lib_sensors_extra =
    adafruit/Adafruit AM2320 sensor library@^1.2.5
    adafruit/RTClib@^2.1.4

; --- Sensores CO2 ---
lib_sensors_co2 =
    sparkfun/SparkFun SCD30 Arduino Library@^1.0.20
    https://github.com/jcomas/S8_UART.git

; --- Herramientas BLE exclusivas de ESP32 ---
lib_esp32_ble =
    sensirion/Sensirion UPT Core@^0.6.0
    h2zero/NimBLE-Arduino@^2.3.4
    https://github.com/danielbernalb/arduino-ble-gadget.git#AireCiudadano_3dic2025

; --- TinyGSM ---
lib_tinygsm =
    https://github.com/danielbernalb/TinyGSM.git#TinyGsmA7670
    vshymanskyy/StreamDebugger@^1.0.1

; --- Dependencia exclusiva ESP8266 (almacenamiento EEPROM) ---
lib_esp8266_core =
    jwrw/ESP_EEPROM@^2.2.1

; =========================================================
; 2. CONFIGURACIÓN GLOBAL (Heredada por todos los envs)
; =========================================================
[env]
framework    = arduino
build_type   = release
upload_speed = 1500000
monitor_speed = 115200


; =========================================================
; 3. ENTORNOS DE COMPILACIÓN (Familia ESP32)
; =========================================================

[env:esp32]
platform = espressif32
board = esp32dev
lib_deps =
    ${common.lib_wifi_master}
    ${common.lib_core}
    ${common.lib_esp32_ble}
    ${common.lib_sensors_basic}
    ${common.lib_display}
    ${common.lib_sensors_extra}
    ${common.lib_pulsador}
    ${common.lib_sensors_co2}
    https://github.com/Xinyuan-LilyGO/TTGO-T-Display.git
    levkovigor/LTR390@^1.0.9
    ricki-z/SDS011 sensor Library@^0.0.8

[env:esp32min]
platform = espressif32
board = esp32dev
build_flags = -D MinVerdef
lib_deps =
    ${common.lib_wifi_master}
    ${common.lib_core}
    ${common.lib_sensors_basic}

[env:esp32s3uno]
; ESP32S3 con formato Arduino UNO

platform = espressif32
board = esp32-s3-devkitc-1
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
build_flags =
    -DBOARD_HAS_PSRAM
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D ESP32S3def
lib_deps =
    ${common.lib_wifi_master}
    ${common.lib_core}
    ${common.lib_esp32_ble}
    ${common.lib_sensors_basic}
    ${common.lib_display}
    ${common.lib_sensors_extra}
    ${common.lib_sensors_co2}
    https://github.com/dok-net/ghostl
    plerup/EspSoftwareSerial@^8.2.0
    adafruit/Adafruit NeoPixel@^1.15.2

[env:esp32c3miniAG]
#ESP32C3 de Air Gradient

platform = espressif32
board = esp32-c3-devkitm-1
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D ESP32C3AGdef
lib_deps =
    ${common.lib_wifi_master}
    ${common.lib_core}
    ${common.lib_esp32_ble}
    ${common.lib_sensors_basic}
    ${common.lib_display}
    ${common.lib_sensors_extra}
    ${common.lib_sensors_co2}
    https://github.com/dok-net/ghostl
    plerup/EspSoftwareSerial@^8.2.0
    adafruit/Adafruit NeoPixel@^1.12.0

[env:esp32wpa2]
platform = espressif32
board = esp32dev
lib_deps =
    ${common.lib_wifi_wpa2}
    ${common.lib_core}
    ${common.lib_esp32_ble}
    ${common.lib_sensors_basic}
    ${common.lib_display}
    ${common.lib_sensors_extra}
    ${common.lib_pulsador}
    https://github.com/Xinyuan-LilyGO/TTGO-T-Display.git


; =========================================================
; 4. ENTORNOS DE COMPILACIÓN (Familia ESP8266)
; =========================================================

[env:esp8266]
# PM, SP, Rain, Incli, Nivel

platform = espressif8266
board = esp12e
lib_deps =
    ${common.lib_wifi_master}
    ${common.lib_core}
    ${common.lib_esp8266_core}
    ${common.lib_sensors_basic}
    ${common.lib_display}
    ${common.lib_sensors_extra}
    ricki-z/SDS011 sensor Library@^0.0.8
    adafruit/Adafruit ADXL345@^1.3.4
    sparkfun/SparkFun LSM9DS1 IMU@^2.0.0

[env:esp8266min]
# PM

platform = espressif8266
board = esp12e
build_flags = -D MinVerdef
lib_deps =
    ${common.lib_wifi_master}
    ${common.lib_core}
    ${common.lib_esp8266_core}
    ${common.lib_sensors_basic}

[env:esp8266minSD]
platform = espressif8266
board = esp12e
build_flags = -D MinVerSDdef
lib_deps =
    ${common.lib_wifi_master}
    ${common.lib_core}
    ${common.lib_esp8266_core}
    ${common.lib_sensors_basic}
    ${common.lib_sensors_extra}

[env:esp8266ros]
platform = espressif8266
board = esp12e
build_flags = -D Rosverdef
lib_deps =
    ${common.lib_wifi_master}
    ${common.lib_core}
    ${common.lib_esp8266_core}
    adafruit/Adafruit SHT31 Library@^2.2.2
    adafruit/Adafruit SHT4x Library@^1.0.5
    adafruit/RTClib@^2.1.4

[env:esp8266mobdata]
platform = espressif8266
board = esp12e
build_flags =
    -D MobDatadef
    -D MinVerdef
lib_deps =
    ${common.lib_wifi_master}
    ${common.lib_core}
    ${common.lib_esp8266_core}
    ${common.lib_sensors_basic}
    ${common.lib_tinygsm}

[env:esp8266mobdataSP]
; Variante móvil mínima: sin PMST ni sensores, solo GSM
platform = espressif8266
board = esp12e
build_flags =
    -D MobDatadef
    -D MinVerdef
    -D MobDataSPver
lib_deps =
    ${common.lib_wifi_master}
    ${common.lib_core}
    ${common.lib_esp8266_core}
    ${common.lib_tinygsm}

[env:esp8285]
platform = espressif8266
board = esp8285
build_flags = -D ESP8285def
lib_deps =
    ${common.lib_wifi_master}
    ${common.lib_core}
    ${common.lib_esp8266_core}
    ${common.lib_sensors_basic}

[env:esp8266wpa2]
; FIX: solo necesita U8g2 (lib_display), NO AM2320 ni RTClib
platform = espressif8266
board = esp12e
lib_deps =
    ${common.lib_wifi_wpa2}
    ${common.lib_core}
    ${common.lib_esp8266_core}
    ${common.lib_sensors_basic}
    ${common.lib_display}

[env:esp8266PA]
platform = espressif8266
board = esp_wroom_02
build_flags = -D PurpleVer
lib_deps =
    ${common.lib_wifi_master}
    ${common.lib_core}
    ${common.lib_esp8266_core}
    ${common.lib_sensors_basic}
    ${common.lib_display}
    ${common.lib_sensors_extra}